apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hot-potato
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    name: hot-potato
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord_webhook: ""
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hot-potato
  source:
    repoURL: https://github.com/cjcocokrisp/homelab
    targetRevision: HEAD
    path: k8s/hot-potato
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true